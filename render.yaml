services:
  - type: web
    name: mk-komunikacija-server
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: mk-server-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: MAX_VOICE_MESSAGES
        value: "10"
      - key: DATABASE_PATH
        value: /var/data/mk-server.db
      - key: CORS_ORIGIN
        value: "*"
      - key: DEFAULT_ROOM_CODE
        value: kanal
      - key: DEFAULT_ROOM_TITLE
        value: Glavni kanal
      - key: APNS_BUNDLE_ID
        value: TomaPrivate.Ministarstvo-Komunikacija
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_KEY_P8
        sync: false
      - key: APNS_PRODUCTION
        value: "false"